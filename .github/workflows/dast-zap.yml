name: DAST ZAP Scan

on:
  push:
    branches:
      - main

jobs:
  zap_scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run OWASP ZAP full scan
        uses: zaproxy/action-full-scan@v0.8.0
        with:
          target: 'http://testphp.vulnweb.com'
          cmd_options: '-a'
